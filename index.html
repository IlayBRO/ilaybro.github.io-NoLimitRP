<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoLimitRP Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="top-nav">
            <span class="copy-link" onclick="copySiteLink()">Copy site link</span>
        </div>
        
        <div class="center-logo">
            <img src="logo_26.png" alt="NoLimitRP Logo" class="server-logo">
        </div>
        
        <div class="cyan-bar">
            <p class="announcement">מופעיל על כלל האתר 10% הנחה שבוע טוב ומבורך - NoLimitRP</p>
            <div class="payment-icons">
                <img src="paypal.png" alt="PayPal">
                <img src="visa.png" alt="Visa">
                <img src="mastercard.png" alt="Mastercard">
                <img src="amex.png" alt="AMEX">
            </div>
        </div>
    </header>
    
    <main>
        </main>

    <script>
        function copySiteLink() {
            const el = document.createElement('textarea');
            el.value = window.location.href; // העתקת קישור האתר הנוכחי
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('קישור האתר הועתק!'); // הצגת הודעת אישור
        }
    </script>
</body>
</html>
